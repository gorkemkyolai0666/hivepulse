version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brewtrack
      POSTGRES_PASSWORD: brewtrack123
      POSTGRES_DB: brewtrack
    ports:
      - '5448:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brewtrack']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '4008:4008'
    environment:
      DATABASE_URL: postgresql://brewtrack:brewtrack123@postgres:5432/brewtrack?schema=public
      JWT_SECRET: brewtrack-dev-secret
      FRONTEND_URL: http://localhost:3008
      PORT: 4008
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run deploy

  frontend:
    build: ./frontend
    ports:
      - '3008:3008'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4008/api
    depends_on:
      - backend
